<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- BRANDING: Silver </> on Black Background -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='black'/><path d='M9 10 L4 16 L9 22 M14 22 L19 10 M23 10 L28 16 L23 22' stroke='%23C0C0C0' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- PDF Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Diagram Engine -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b;
        color: #e4e4e7;
        overflow-x: hidden;
      }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #18181b; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #52525b; }

      .markdown-body {
        font-family: 'Inter', sans-serif;
        color: #d4d4d8;
        line-height: 1.6;
      }
      .markdown-body h1 { font-size: 1.875rem; font-weight: 800; color: #fff; margin-top: 2rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #27272a; }
      .markdown-body h1:first-child { margin-top: 0; }
      .markdown-body h2 { font-size: 1.5rem; font-weight: 700; color: #f4f4f5; margin-top: 1.75rem; margin-bottom: 0.75rem; }
      .markdown-body p { margin-bottom: 1rem; }
      .markdown-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.875em; background-color: #27272a; padding: 0.125rem 0.375rem; border-radius: 0.25rem; color: #a5b4fc; }
      .markdown-body pre { background-color: #18181b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid #27272a; }

      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

      .text-gradient-animate {
        background: linear-gradient(to right, #fff, #94a3b8, #fff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        background-size: 200% auto;
        animation: shine 5s linear infinite;
      }
      @keyframes shine { to { background-position: 200% center; } }
      
      /* PDF Export Specific Overrides to ensure consistency */
      .pdf-export-mode {
        background-color: #050505 !important;
        padding: 40px !important;
        color: #e4e4e7 !important;
      }
    </style>
    <script type="importmap">

  }
}
</script>
